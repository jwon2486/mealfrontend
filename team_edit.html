<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>부서 식사 신청 관리</title>
  <link rel="stylesheet" href="css/teamcheck_style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <img src="logo/SnSYS_logo.png" alt="회사 로고" />
        <div class="title">
          <strong>에스엔시스 부서 식사 관리</strong>
          <span>Department Meal Management</span>
        </div>
      </div>
      <div class="top-actions">
        <div class="pill">⚙️ 담당자 모드</div>
      </div>
    </header>

    <main class="shell">
      <div class="erp-layout">
        <aside class="erp-sidebar">
          <nav class="erp-nav">
            <button class="nav-item active">📋 부서 식수 신청 관리</button>
            <button class="nav-item" onclick="window.location.href='index.html'">🏠 메인화면</button>
          </nav>
          
          <div class="sidebar-summary-box">
            <div class="summary-title">📈 주간 신청 집계</div>
            <div class="summary-item">총 부서원: <span id="totalPeople" class="num-highlight">0</span>명</div>
            <div class="summary-item">조식 합계: <span id="totalBreakfast" class="num-highlight">0</span>식</div>
            <div class="summary-item">중식 합계: <span id="totalLunch" class="num-highlight">0</span>식</div>
            <div class="summary-item">석식 합계: <span id="totalDinner" class="num-highlight">0</span>식</div>
          </div>

          <div class="erp-sidebar-actions sidebar-btn-group">
            <button class="btn btn-primary w-full" onclick="saveEditChanges()">💾 변경사항 저장</button>
            <button class="btn btn-secondary w-full" onclick="window.location.href='index.html'">← 뒤로가기</button>
          </div>
        </aside>

        <div class="erp-content">
          <section class="card filter-card">
            <div class="search-flex">
              <div class="input-box">
                <label>조회 주차 선택</label>
                <input type="date" id="editWeekPicker" />
              </div>
              <div class="input-box">
                <label>성명</label>
                <input type="text" id="searchName" placeholder="이름 검색" />
              </div>
              <div class="input-box">
                <label>사번</label>
                <input type="text" id="searchEmpId" placeholder="사번 검색" />
              </div>
              <div class="input-box">
                <label>본인확인</label>
                <select id="selfcheckFilter">
                  <option value="">전체</option>
                  <option value="1">본인확인 O</option>
                  <option value="0">본인확인 X</option>
                </select>
              </div>
              <div class="input-box">
                <label>근무지역</label>
                <select id="regionFilter">
                  <option value="">전체</option>
                  <option value="에코센터">에코센터</option>
                  <option value="테크센터">테크센터</option>
                  <option value="기타">기타</option>
                </select>
              </div>
              <button class="btn btn-primary" onclick="loadEditData(document.getElementById('editWeekPicker').value)">🔍 조회</button>
            </div>
          </section>

          <section class="card table-card">
            <div id="empGrid" class="emp-grid-container"></div>
          </section>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/util.js"></script>
  <script src="js/team_edit.js"></script>
</body>
</html>
