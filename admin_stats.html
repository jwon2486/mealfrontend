<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>통계 대시보드</title>
  <link rel="stylesheet" href="css/stats.css" />
  <script>
  const savedUser = sessionStorage.getItem("currentUser");
  if (!savedUser) {
    location.href = "index.html";  // 로그인 안 되어 있음
  } else {
    const user = JSON.parse(savedUser);
    if (user.level !== 3) {
      alert("관리자만 접근 가능합니다.");
      location.href = "index.html"; // 관리자 권한 아님
    }
  }
</script>
</head>
<body>
  <h2>🍱 식사 신청 통계 대시보드</h2>
  
  <div class="date-range">
    <label>시작 날짜: <input type="date" id="startDate" /></label>
    <label>종료 날짜: <input type="date" id="endDate" /></label>
    <button onclick="window.location.href='admin_dashboard.html'">← 관리자 대시보드</button>
  </div>

  <div class="stats-wrapper">
    <div class="table-section">
      <div class="stat-action-buttons">
        <button onclick="loadStats()">📊 통계 조회</button>
        <button onclick="downloadStatsExcel()">⬇️ 엑셀 다운로드</button>
      </div>
      </br>
      <table id="stats-table">
        <thead>
          <tr>
            <th>날짜</th>
            <th>요일</th>
            <th>조식</th>
            <th>중식</th>
            <th>석식</th>
          </tr>
        </thead>
        <tbody id="stats-body"></tbody>
        <tfoot></tfoot>
      </table>
    </div>
  
    <div class="graph-section" id="auto-compare-section">
      <h3>🔎 식사 데이터 자동 분석기</h3>
      <p class="section-desc">실적 엑셀을 업로드하여 DB와 대조 분석합니다. (조직/부서 열 자동 인식)</p>
      
      <div class="analysis-upload-box">
        <input type="file" id="actualFileOnly" accept=".xlsx, .xls" />
        <button onclick="runAutoCompare()" class="btn-analyze">📊 분석 및 엑셀 다운로드</button>
      </div>

      <div id="compare-status" class="status-msg">
        🔄 데이터를 대조 중입니다. 잠시만 기다려 주세요...
      </div>

      <div id="analysis-result-dashboard" class="analysis-dashboard">
        <h4 id="analysis-period-title"></h4>
        
        <div class="analysis-cards">
          <div class="analysis-card no-show">
            <h4>노쇼(No-Show)</h4>
            <span id="res-no-show" class="count">0</span>
          </div>
          <div class="analysis-card unreg">
            <h4>미신청 식사</h4>
            <span id="res-unreg" class="count">0</span>
          </div>
          <div class="analysis-card partner">
            <h4>협력사 식수</h4>
            <span id="res-partner" class="count">0</span>
          </div>
    </div>

    <div class="analysis-detail-section">
      <div class="detail-header">
        <h4>📋 상세 명단 확인</h4>
        <select id="detailTypeSelect" onchange="switchDetailTable()">
          <option value="no-show">노쇼 명단</option>
          <option value="unreg">미신청 식사 명단</option>
          <option value="partner">협력사 식사 현황</option>
          
        </select>
      </div>
      <div class="detail-table-container">
        <table class="detail-table">
          <thead id="detail-thead"></thead>
          <tbody id="detail-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
  </div>

  </br>
  <div class="stats-wrapper">
    <!-- ✅ 부서별 신청현황 테이블 영역 -->
    <div class="table-section" id="dept-section"> 
     <div class="stat-action-buttons">
       <button onclick="loadDeptStats()">🏢 부서별 신청현황 조회</button>
       <button onclick="downloadDeptStatsExcel()">⬇️ 엑셀 다운로드</button>
     </div>
    </br>
      <table id="dept-stats-table">
       <thead>
         <tr>
           <th>부서</th>
           <th>계</th>
           <th>조식</th>
           <th>중식</th>
           <th>석식</th>
         </tr>
       </thead>
       <tbody id="dept-stats-body"></tbody>
      </table>
    </div>
    <!-- ✅ 주간 부서별 신청현황 테이블 영역 -->
    <div class="table-section" id="weekly-dept-section">
     <div class="stat-action-buttons">
       <label>기준 날짜:
         <input type="date" id="weeklyBaseDate" />
       </label>
       <button onclick="loadWeeklyDeptStats()">📅 주간 부서별 신청현황 조회</button>
       <button onclick="downloadPivotStyleExcel()">⬇️ 피벗형 통계 다운로드</button>
       <!-- <button onclick="downloadWeeklyDeptExcel()">⬇️ 엑셀 다운로드</button> -->
       <button id="btnDaySelectToggle" type="button" onclick="toggleAllDayCheckboxes()">전체선택</button>
       
      </div>
      <br />
      <table id="weekly-dept-table">
        <thead id="weekly-dept-thead"></thead>
        <tbody id="weekly-dept-body"></tbody>
      </table>
    </div>
  </div>
 
  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
  <script src="js/config.js"></script>
  <script src="js/util.js"></script>
  <script src="js/admin_stats.js" defer></script>
  <script src="js/auth.js"></script>
</body>
</html>
