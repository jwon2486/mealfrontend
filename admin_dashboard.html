<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드 - 식수 신청 시스템</title>
    <link rel="stylesheet" href="css/style_premium.css">
    <link rel="stylesheet" href="css/dashboard_style.css">
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div class="brand">
                <img src="logo/SnSYS_logo.png" alt="회사 로고" />
                <div class="title">
                    <strong>에스엔시스 식수 신청 시스템</strong>
                    <span>Admin Dashboard</span>
                </div>
            </div>

            <div class="top-actions">
                <div id="topUserPill" class="pill">
                    👤 <span id="topUserText">관리자 모드</span>
                </div>
            </div>
        </header>

        <main class="shell">
            <div class="admin-dashboard-wrapper">
                <section class="card pad">
                    
                    <div class="dashboard-header">
                        <div class="card-title">
                            <h2>⚙️ 관리자 대시보드</h2>
                            <p>시스템 설정 및 신청 내역을 관리합니다.</p>
                        </div>
                        <button type="button" id="logoutBtn" class="action-btn logout-btn">← 메인화면으로</button>
                    </div>

                    <div class="admin-section">
                        <div class="admin-section-title">🔍 조회 및 통계</div>
                        <div class="admin-grid">
                            <div class="admin-tile nav-btn" data-page="admin_stats.html">
                                <span class="icon">📊</span>
                                <span class="title">통계</span>
                            </div>
                            <div class="admin-tile nav-btn" data-page="admin_edit.html">
                                <span class="icon">📝</span>
                                <span class="title">신청 내역 변경</span>
                            </div>
                        </div>
                    </div>

                    <div class="admin-section">
                        <div class="admin-section-title">✏️ 변경 업무</div>
                        <div class="admin-grid">
                            
                            <div class="admin-tile nav-btn" data-page="admin_employees.html">
                                <span class="icon">👥</span>
                                <span class="title">인력 현황 변경</span>
                            </div>
                            <div class="admin-tile nav-btn" data-page="admin_logs.html">
                                <span class="icon">🕒</span>
                                <span class="title">변경 신청 내역</span>
                            </div>
                        </div>
                    </div>

                    <div class="admin-section">
                        <div class="admin-section-title">⚙️ 관리 업무</div>
                        <div class="admin-grid">
                            <div class="admin-tile nav-btn" data-page="admin_visitor.html">
                                <span class="icon">🧾</span>
                                <span class="title">방문자/협력사 관리</span>
                            </div>
                            <div class="admin-tile nav-btn" data-page="admin_holiday.html">
                                <span class="icon">📅</span>
                                <span class="title">공휴일 관리</span>
                            </div>
                        </div>
                    </div>

                </section>
            </div>

            <div id="toast" class="toast"></div>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/util.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin_dashboard.js"></script>
</body>
</html>
