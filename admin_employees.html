<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>에스엔시스 - 직원 관리 Admin</title>
  <link rel="stylesheet" href="css/employees.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <img src="logo/SnSYS_logo.png" alt="회사 로고" />
        <div class="title">
          <strong>에스엔시스 인력 관리</strong>
          <span>Employee Management</span>
        </div>
      </div>
      <div class="top-actions">
        <div class="pill">👤 관리자 모드</div>
      </div>
    </header>

    <main class="shell">
      <div class="erp-layout">
        <aside class="erp-sidebar">
          <nav class="erp-nav">
            <button class="nav-item active">👥 직원 관리</button>
            <button class="nav-item" onclick="location.href='admin_dashboard.html'">📊 대시보드</button>
            <button class="nav-item" onclick="location.href='index.html'">🏠 메인화면</button>
          </nav>
          <div class="erp-sidebar-actions" style="margin-top: 1.25rem; padding: 0 0.625rem;">
            <button class="btn btn-secondary" style="width:100%; margin-bottom:0.625rem;" onclick="downloadEmployeeTemplate()">📄 양식 다운로드</button>
            <div class="upload-box" style="background: rgba(255,255,255,0.1); padding: 0.625rem; border-radius: 0.5rem;">
                <label style="font-size: 0.75rem; color: #cbd5e1;">엑셀 일괄 업로드</label>
                <input type="file" id="uploadFile" style="font-size: 0.6875rem; margin: 0.3125rem 0;">
                <button class="btn btn-primary" style="width:100%; font-size: 0.75rem;" onclick="uploadEmployeeFile()">업로드 실행</button>
            </div>
          </div>
        </aside>

        <div class="erp-content">
          <section class="card filter-card">
            <div class="search-flex">
              <div class="input-box">
                <label>지역</label>
                <input type="text" id="filterRegion" placeholder="지역 검색" onkeyup="filterEmployees()">
              </div>
              <div class="input-box">
                <label>부서</label>
                <input type="text" id="filterDept" placeholder="부서 검색" onkeyup="filterEmployees()">
              </div>
              <div class="input-box">
                <label>성명</label>
                <input type="text" id="filterName" placeholder="이름 검색" onkeyup="filterEmployees()">
              </div>
              <button class="btn btn-primary" onclick="filterEmployees()">🔍 검색</button>
              <button class="btn btn-secondary" onclick="resetFilter()">🔄 초기화</button>
              <button class="btn btn-primary" style="background: #166534;" onclick="openAddModal()">+ 신규 등록</button>
            </div>
          </section>

          <section class="card table-card">
            <div class="table-container">
              <table id="emp-table">
                <thead>
                  <tr>
                    <th>사번</th>
                    <th>성명</th>
                    <th>지역</th>
                    <th>부서</th>
                    <th>구분</th>
                    <th>직급</th>
                    <th>권한</th>
                    <th colspan="2">관리</th>
                  </tr>
                </thead>
                <tbody id="emp-body"></tbody>
              </table>
            </div>
            <div id="pagination" class="pagination-container"></div>
          </section>
        </div>
      </div>
    </main>

    <div id="editModal" class="modal-overlay">
      <div class="modal-window">
        <div class="modal-header" id="modalTitle">직원 정보 설정</div>
        <div class="modal-body">
          <div class="form-grid">
            <div class="field"><label>사번</label><input type="text" id="empId"></div>
            <div class="field"><label>성명</label><input type="text" id="empName"></div>
            <div class="field"><label>지역</label><input type="text" id="empRegion" placeholder="에코센터/테크센터"></div>
            <div class="field"><label>부서</label><input type="text" id="empDept"></div>
            <div class="field"><label>구분</label><input type="text" id="empType" placeholder="직영/협력사"></div>
            <div class="field"><label>직급</label><input type="text" id="empRank"></div>
            <div class="field full">
              <label>권한 설정</label>
              <select id="empLevel">
                <option value="1">1 (일반)</option>
                <option value="2">2 (담당자)</option>
                <option value="3">3 (관리자)</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button id="saveBtn" class="btn btn-primary" onclick="saveEmployee()">저장하기</button>
          <button class="btn btn-secondary" onclick="closeModal()">취소</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/util.js"></script>
  <script src="js/admin_employees.js"></script>
</body>
</html>
